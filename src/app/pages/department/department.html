<!-- Page Header -->
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h4 class="mb-0 fw-semibold"><i class="fas fa-building me-2 text-primary"></i>Departments</h4>
    <small class="text-muted">Manage your organization departments</small>
  </div>
</div>

<!-- Form Card -->
<div class="card shadow-sm mb-4">
  <div class="card-header bg-white py-3">
    <h6 class="mb-0 fw-semibold text-secondary">
      <i class="fas fa-plus-circle me-2"></i>Add / Edit Department
    </h6>
  </div>
  <div class="card-body">
    <div class="row align-items-center g-3">

      <div class="col-3">
        <label class="form-label fw-medium">Department Name</label>
        <input type="text" class="form-control" placeholder="Enter department name" [(ngModel)]="newDeptObj.departmentName" />
      </div>

      <div class="col-2">
        <label class="form-label fw-medium d-block">Is Active</label>
        <div class="form-check form-switch mt-1">
          <input class="form-check-input" type="checkbox" role="switch" id="isActive" checked [(ngModel)]="newDeptObj.isActive" />
          <label class="form-check-label text-muted" for="isActive">Active</label>
        </div>
      </div>

      <div class="col-auto">
        <label class="form-label d-block invisible">Actions</label>
        <button class="btn btn-primary me-2" (click)="onSaveDept()">
          <i class="fas fa-save me-1"></i> Save
        </button>
        <button class="btn btn-outline-secondary">
          <i class="fas fa-undo me-1"></i> Reset
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Table Card -->
<div class="card shadow-sm">
  <div class="card-header bg-white py-3 d-flex align-items-center justify-content-between">
    <h6 class="mb-0 fw-semibold text-secondary">
      <i class="fas fa-list me-2"></i>Department List
    </h6>
    <span class="badge bg-primary rounded-pill">4 Records</span>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4" style="width: 60px;">#</th>
            <th>Department Name</th>
            <th class="text-center" style="width: 120px;">Status</th>
            <th class="text-center" style="width: 140px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ps-4 text-muted">1</td>
            <td class="fw-medium">Human Resources</td>
            <td class="text-center">
              <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3">
                <i class="fas fa-circle me-1" style="font-size:0.5rem;"></i>Active
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1" title="Edit">
                <i class="fas fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
          <tr>
            <td class="ps-4 text-muted">2</td>
            <td class="fw-medium">Finance</td>
            <td class="text-center">
              <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3">
                <i class="fas fa-circle me-1" style="font-size:0.5rem;"></i>Active
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1" title="Edit">
                <i class="fas fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
          <tr>
            <td class="ps-4 text-muted">3</td>
            <td class="fw-medium">Engineering</td>
            <td class="text-center">
              <span class="badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle px-3">
                <i class="fas fa-circle me-1" style="font-size:0.5rem;"></i>Inactive
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1" title="Edit">
                <i class="fas fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
          <tr>
            <td class="ps-4 text-muted">4</td>
            <td class="fw-medium">Marketing</td>
            <td class="text-center">
              <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3">
                <i class="fas fa-circle me-1" style="font-size:0.5rem;"></i>Active
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1" title="Edit">
                <i class="fas fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
