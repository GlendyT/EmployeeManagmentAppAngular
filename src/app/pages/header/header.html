<div class="d-flex" id="wrapper" [class.toggled]="isCollapsed">

    <!-- Sidebar -->
    <div id="sidebar-wrapper" [class.collapsed]="isCollapsed">
        <div class="sidebar-heading d-flex align-items-center justify-content-center py-3">
            <i class="fas fa-users-cog me-2"></i>
            <span *ngIf="!isCollapsed" class="fw-bold">AdminPanel</span>
        </div>
        <hr class="text-secondary mx-3 my-0">
        <div class="list-group list-group-flush mt-2">
            <a routerLink="/dashboard" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-3">
                <i class="fas fa-tachometer-alt"></i>
                <span *ngIf="!isCollapsed">Dashboard</span>
            </a>
            <a routerLink="/employees" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-3">
                <i class="fas fa-users"></i>
                <span *ngIf="!isCollapsed">Employees</span>
            </a>
            <a routerLink="/new-employee" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-3">
                <i class="fas fa-user-plus"></i>
                <span *ngIf="!isCollapsed">Add Employee</span>
            </a>
            <a routerLink="/department" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-3">
                <i class="fas fa-building"></i>
                <span *ngIf="!isCollapsed">Departments</span>
            </a>
            <a routerLink="/designation" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-3">
                <i class="fas fa-id-badge"></i>
                <span *ngIf="!isCollapsed">Designations</span>
            </a>
        </div>
    </div>
    <!-- End Sidebar -->

    <!-- Page Content -->
    <div id="page-content-wrapper" class="w-100">

        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-sm">
            <button class="btn btn-outline-light me-3" (click)="toggleSidebar()">
                <i class="fas" [class.fa-bars]="isCollapsed" [class.fa-times]="!isCollapsed"></i>
            </button>
            <span class="navbar-brand mb-0 h5">Employee Management</span>

            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-light"><i class="fas fa-bell"></i></span>
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle text-light d-flex align-items-center gap-2" href="#"
                        role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle fs-5"></i>
                        <span>Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" routerLink="/login"><i
                                    class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- End Top Navbar -->

        <!-- Router Content -->
        <div class="container-fluid p-4">
            <router-outlet />
        </div>

    </div>
    <!-- End Page Content -->

</div>
